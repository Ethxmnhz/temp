version: '3.8'

services:
  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: hs_wp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: WpDb@2026!
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  wordpress:
    build: ./wordpress
    image: hexaexam/wordpress:latest
    platform: linux/amd64
    container_name: hs_wp_web
    restart: unless-stopped
    ports:
      - "8080:80"
      - "2222:22"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: WpDb@2026!
      WORDPRESS_DB_NAME: wordpress
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/intranet/ >/dev/null 2>&1 || curl -sf http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  db_data:
